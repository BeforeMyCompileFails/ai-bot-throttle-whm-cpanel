# AI bot rate-limiting — shared across all customer sites
# https://github.com/BeforeMyCompileFails/ai-bot-throttle-cpanel
#
# Installs to: /etc/nginx/conf.d/ai-bot-throttle.conf
# Defines the bot user-agent map and the rate-limit zone at http{} level.

# Step 1: classify the user-agent as bot (1) or not (0)
map $http_user_agent $is_ai_bot {
    default 0;

    # ── Background AI crawlers (throttled — they crawl on their own schedule) ──
    "~*ClaudeBot"          1;
    "~*GPTBot"             1;
    "~*CCBot"              1;
    "~*anthropic-ai"       1;
    "~*PerplexityBot"      1;
    "~*Bytespider"         1;
    "~*Amazonbot"          1;
    "~*Google-Extended"    1;
    "~*Applebot-Extended"  1;
    "~*meta-externalagent" 1;
    "~*FacebookBot"        1;
    "~*ImagesiftBot"       1;
    "~*Omgilibot"          1;
    "~*YouBot"             1;

    # ── SEO scrapers (throttled — no value back to site owners) ──
    "~*MJ12bot"            1;
    "~*AhrefsBot"          1;
    "~*SemrushBot"         1;
    "~*DotBot"             1;
    "~*IbouBot"            1;
    "~*Diffbot"            1;
    "~*DataForSeoBot"      1;
    "~*BLEXBot"            1;
    "~*PetalBot"           1;
    "~*SeznamBot"          1;

    # ── DELIBERATELY NOT THROTTLED ──
    # ChatGPT-User, Claude-User, Perplexity-User: real-time fetches when a
    # human asks an AI a question and the AI fetches your page to cite it.
    # These are rare, per-user, and signal someone is actively citing you.
    # We want them to succeed quickly.
}

# Step 2: build the rate-limit key — IP for bots, EMPTY for humans
# When the key is empty, nginx documentation explicitly states limit_req
# is bypassed for that request. This is THE canonical selective-throttle pattern.
map $is_ai_bot $ai_bot_limit_key {
    0 "";
    1 $binary_remote_addr;
}

# 1 request/sec sustained per bot IP, 10MB zone (~160k unique IPs tracked)
limit_req_zone $ai_bot_limit_key zone=ai_bots:10m rate=1r/s;

# Return 429 Too Many Requests (bots understand this and back off)
# rather than the default 503 (which can confuse monitoring)
limit_req_status 429;
