# AI bot rate-limiting enforcement — applied to every customer server block
# https://github.com/BeforeMyCompileFails/ai-bot-throttle-whm-cpanel
#
# Installs to: /etc/nginx/conf.d/server-includes/ai-bot-throttle.conf
# EA-Nginx auto-includes everything in /etc/nginx/conf.d/server-includes/
# into every customer's server block on config rebuild.
#
# Map and zone defined in /etc/nginx/conf.d/ai-bot-throttle.conf
#
# burst=5  — absorbs short legitimate bursts (e.g. crawler fetches a page
#            with embedded resources) without 429-ing
# nodelay  — bursts go straight through (don't queue), excess gets 429
limit_req zone=ai_bots burst=5 nodelay;
